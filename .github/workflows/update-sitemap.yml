name: Update Sitemap

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:  # Manual trigger button in GitHub

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate sitemap and sneaker meta
        env:
          KICKSDB_API_KEY: ${{ secrets.KICKSDB_API_KEY }}
        run: node scripts/generate-sitemap.js

      - name: Generate static sneaker pages
        run: node scripts/generate-sneaker-pages.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml sneaker-meta.json sneaker/
          git diff --staged --quiet || (git commit -m "Update sitemap + sneaker pages [auto]" && git push)
