# OG image headers for Twitter/social crawlers
[[headers]]
  for = "/og-image.png"
  [headers.values]
    Content-Type = "image/png"
    Cache-Control = "public, max-age=86400"

# Sneaker detail pages (SEO)
[[redirects]]
  from = "/sneaker/*"
  to = "/sneaker.html"
  status = 200

# Standalone pages (clean URLs)
[[redirects]]
  from = "/resell"
  to = "/resell.html"
  status = 200

[[redirects]]
  from = "/auth"
  to = "/auth.html"
  status = 200

[[redirects]]
  from = "/releases"
  to = "/releases.html"
  status = 200

[[redirects]]
  from = "/collection"
  to = "/collection.html"
  status = 200

