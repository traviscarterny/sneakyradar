<script>
const API_URL = "/.netlify/functions/anthropic";

// Get sneaker slug from URL
const pathParts = window.location.pathname.split("/").filter(Boolean);
// Expected: /sneaker/some-sneaker-slug
const sneakerSlug = pathParts.length >= 2 ? decodeURIComponent(pathParts.slice(1).join("/")) : null;

// State
let sneaker = null;
let related = [];
let loading = true;
let error = false;
let mobileMenuOpen = false;

// Escaping
function esc(s) {
  if (s == null) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Convert slug to search query
function slugToQuery(slug) {
  if (!slug) return "";
  return slug.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
}

// Generate slug from sneaker name
function nameToSlug(name) {
  if (!name) return "";
  return name.toLowerCase()
    .replace(/['']/g, "")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-|-$/g, "");
}

// KicksDB data to our format (same as main site)
function kicksToDrops(products) {
  return (products || []).map(function(p) {
    var slug = p.slug || "";
    var stockxUrl = slug ? "https://stockx.com/" + slug : null;
    var avgPrice = p.avg_price || p.min_price || null;
    var retailPrice = p.retail_price || null;
    var badge = "hot";
    if (p.upcoming) badge = "upcoming";
    else if (p.weekly_orders && p.weekly_orders < 5) badge = "limited";
    var hype = null;
    if (p.weekly_orders) hype = Math.min(99, Math.round(50 + Math.log2(p.weekly_orders + 1) * 8));
    else if (p.rank) hype = Math.max(30, Math.min(95, 100 - Math.round(p.rank / 100)));

    var prices = [];
    if (p.min_price) {
      prices.push({ store: "StockX", storeId: "stockx", price: "$" + Math.round(p.min_price), url: stockxUrl || "https://stockx.com" });
    }
    var nikeQuery = encodeURIComponent((p.title || p.name || "").replace(/\s+/g, "+"));
    prices.push({ store: "Nike", storeId: "nike", price: "Check Price", url: "https://www.nike.com/w?q=" + nikeQuery });
    if (p._ebay && p._ebay.price) {
      prices.push({ store: p._ebay.authenticity ? "eBay ✓" : "eBay", storeId: "ebay", price: "$" + Math.round(p._ebay.price), url: p._ebay.url || "https://www.ebay.com" });
    }
    var kcQuery = encodeURIComponent((p.title || p.name || "") + " " + (p.sku || ""));
    prices.push({ store: "Kicks Crew", storeId: "kickscrew", price: "Check Price", url: "https://www.kickscrew.com/search?type=product&q=" + kcQuery });
    var amzQuery = encodeURIComponent((p.title || p.name || "") + " " + (p.sku || ""));
    prices.push({ store: "Amazon", storeId: "amazon", price: "Check Price", url: "https://www.amazon.com/s?k=" + amzQuery + "&tag=sneakyradar-20" });

    var lowestPrice = p.min_price || null;
    var maxPrice = p.max_price || null;
    var sourceNames = ["StockX"];
    if (p._nike) sourceNames.push("Nike");
    if (p._ebay) sourceNames.push("eBay");
    sourceNames.push("Amazon");

    return {
      brand: p.brand || "Unknown",
      name: p.title || p.name || "Unknown",
      date: p.release_date ? new Date(p.release_date).toLocaleDateString("en-US", {month:"short",day:"numeric",year:"numeric"}) : (p.upcoming ? "Coming Soon" : "Available"),
      retail: retailPrice ? "$" + retailPrice : (avgPrice ? "$" + Math.round(avgPrice) : "—"),
      resell: lowestPrice && maxPrice ? "$" + Math.round(lowestPrice) + " – $" + Math.round(maxPrice) : (avgPrice ? "$" + Math.round(avgPrice) + "+" : null),
      hype: hype,
      badge: badge,
      colorway: p.colorway || p.color || null,
      image: p.image || null,
      source: sourceNames.join(" + "),
      sourceUrl: stockxUrl,
      sku: p.sku || null,
      slug: slug,
      prices: prices,
    };
  });
}

// Update meta tags for SEO
function updateMeta(drop) {
  var title = drop.name + " — Price Comparison | SneakyRadar";
  var desc = "Compare " + drop.name + " prices across StockX, eBay, Nike, Amazon and more. " + (drop.retail ? "Retail: " + drop.retail + ". " : "") + (drop.resell ? "Resell: " + drop.resell + "." : "");
  var url = "https://www.sneakyradar.com/sneaker/" + nameToSlug(drop.name);

  document.title = title;
  document.querySelector('meta[name="description"]').content = desc;
  var cl = document.getElementById("canonical-link");
  if (cl) cl.href = url;
  var ogt = document.getElementById("og-title");
  if (ogt) ogt.content = title;
  var ogd = document.getElementById("og-desc");
  if (ogd) ogd.content = desc;
  var ogu = document.getElementById("og-url");
  if (ogu) ogu.content = url;
  var twt = document.getElementById("tw-title");
  if (twt) twt.content = title;
  var twd = document.getElementById("tw-desc");
  if (twd) twd.content = desc;

  // Update structured data
  var ldEl = document.getElementById("ld-json");
  if (ldEl) {
    var ld = [
      {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": drop.name,
        "description": desc,
        "url": url,
        "brand": {"@type": "Brand", "name": drop.brand},
        "sku": drop.sku || "",
        "image": drop.image || "https://www.sneakyradar.com/og-image.png",
      },
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          {"@type": "ListItem", "position": 1, "name": "Home", "item": "https://www.sneakyradar.com"},
          {"@type": "ListItem", "position": 2, "name": drop.brand || "Sneakers", "item": "https://www.sneakyradar.com/?search=" + encodeURIComponent(drop.brand || "")},
          {"@type": "ListItem", "position": 3, "name": drop.name, "item": url}
        ]
      }
    ];
    // Add offers if we have price data
    if (drop.prices && drop.prices.length > 0) {
      var numericPrices = drop.prices.filter(function(p) { return p.price && p.price.startsWith("$"); }).map(function(p) { return parseFloat(p.price.replace("$","")); });
      if (numericPrices.length > 0) {
        ld[0].offers = {
          "@type": "AggregateOffer",
          "priceCurrency": "USD",
          "lowPrice": Math.min.apply(null, numericPrices),
          "highPrice": Math.max.apply(null, numericPrices),
          "offerCount": drop.prices.length,
        };
      }
    }
    ldEl.textContent = JSON.stringify(ld);
  }
}

  var tabs = [
    {id:"drops",label:"Drop Radar",icon:"📡",href:"/"},

  return '<nav class="nav"><div class="nav-left">' +
    '<a class="nav-logo" href="/" style="text-decoration:none"><span class="sneaky">SNEAKY</span><span class="radar">RADAR</span></a>' +
    '<div class="nav-tabs">' +
    tabs.map(function(t) {
      return '<a class="nav-tab" href="' + t.href + '" style="text-decoration:none"><span>' + t.icon + '</span>' + t.label + '</a>';
    }).join("") +
    '</div>' +
    '<button class="hamburger" data-action="hamburger">☰</button>' +
    '</div>' +
    (mobileMenuOpen ? '<div class="mobile-menu">' + tabs.map(function(t) {
      return '<a class="mobile-menu-item" href="' + t.href + '" style="text-decoration:none"><span>' + t.icon + '</span>' + t.label + '</a>';
    }).join("") + '</div>' : '') +
    '</nav>';
}

function renderBreadcrumb(drop) {
  var name = drop ? esc(drop.name) : "Loading...";
  return '<div class="breadcrumb"><a href="/">Home</a><span class="sep">›</span><a href="/">Drop Radar</a><span class="sep">›</span><span>' + name + '</span></div>';
}

function renderLoading() {
  return '<div class="loading-wrap"><div class="loading-dot"></div><div class="loading-text">Scanning prices...</div></div>';
}

function renderNotFound() {
  return '<div class="not-found"><h2>Sneaker Not Found</h2><p>We couldn\'t find pricing data for this sneaker.</p><a href="/">← Back to Drop Radar</a></div>';
}

function renderDetail(drop) {
  var BADGE_MAP = {hot:"badge-hot",upcoming:"badge-upcoming",limited:"badge-limited"};
  var BADGE_LABELS = {hot:"🔥 HOT",upcoming:"UPCOMING",limited:"LIMITED"};

  var imageHtml = drop.image
    ? '<img class="detail-image" src="' + esc(drop.image) + '" alt="' + esc(drop.name) + '" onerror="this.parentNode.innerHTML=\'<div class=detail-image-placeholder>' + esc(drop.brand ? drop.brand.charAt(0) : "?") + '</div>\'">'
    : '<div class="detail-image-placeholder">' + esc(drop.brand ? drop.brand.charAt(0) : "?") + '</div>';

  var priceRows = (drop.prices || []).map(function(p) {
    var isCheck = p.price === "Check Price";
    return '<tr>' +
      '<td class="store-name">' + esc(p.store) + '</td>' +
      '<td class="store-price' + (isCheck ? " check" : "") + '">' + esc(p.price) + '</td>' +
      '<td><a class="buy-btn" href="' + esc(p.url) + '" target="_blank" rel="noopener noreferrer nofollow">Buy</a></td>' +
      '</tr>';
  }).join("");

  var html = '<div class="detail-wrap">';
  html += '<a class="back-link" href="/">← Back to Drop Radar</a>';
  html += '<div class="detail-grid">';

  // Left: Image
  html += '<div class="detail-image-wrap">' + imageHtml;
  if (drop.source) html += '<div class="detail-source-tag">' + esc(drop.source) + '</div>';
  html += '</div>';

  // Right: Info
  html += '<div class="detail-info">';
  if (drop.badge) html += '<div class="badge ' + (BADGE_MAP[drop.badge]||"badge-upcoming") + '">' + (BADGE_LABELS[drop.badge]||esc(drop.badge)) + '</div>';
  html += '<div class="detail-brand">' + esc(drop.brand) + '</div>';
  html += '<div class="detail-name">' + esc(drop.name) + '</div>';
  if (drop.colorway) html += '<div class="detail-colorway">' + esc(drop.colorway) + '</div>';
  if (drop.sku) html += '<div class="detail-sku">SKU: ' + esc(drop.sku) + '</div>';

  html += '<div class="detail-meta">';
  html += '<div class="detail-meta-row"><span class="detail-meta-label">Release</span><span class="detail-meta-value">' + esc(drop.date || "TBD") + '</span></div>';
  html += '<div class="detail-meta-row"><span class="detail-meta-label">Retail</span><span class="detail-meta-value price">' + esc(drop.retail || "—") + '</span></div>';
  if (drop.resell) html += '<div class="detail-meta-row"><span class="detail-meta-label">Est. Resell</span><span class="detail-meta-value">' + esc(drop.resell) + '</span></div>';
  html += '</div>';

  if (drop.hype) {
    html += '<div class="hype-section"><div class="hype-bar"><div class="hype-fill" style="width:' + drop.hype + '%"></div></div>';
    html += '<div class="hype-label"><span>Hype Index</span><span>' + drop.hype + '/100</span></div></div>';
  }
  html += '</div>'; // detail-info
  html += '</div>'; // detail-grid

  // Price comparison table
  if (drop.prices && drop.prices.length > 0) {
    html += '<div class="prices-section"><div class="prices-heading">Compare Prices</div>';
    html += '<table class="prices-table"><thead><tr><th>Store</th><th>Price</th><th></th></tr></thead><tbody>' + priceRows + '</tbody></table>';
    html += '</div>';
  }

  // Related sneakers
  if (related.length > 0) {
    html += '<div class="related-section"><div class="related-heading">Related Sneakers</div><div class="related-grid">';
    related.forEach(function(r) {
      var rSlug = nameToSlug(r.name);
      html += '<a class="related-card" href="/sneaker/' + esc(rSlug) + '">';
      html += '<div class="related-card-brand">' + esc(r.brand) + '</div>';
      html += '<div class="related-card-name">' + esc(r.name) + '</div>';
      html += '<div class="related-card-price">' + esc(r.retail || "—") + '</div>';
      html += '</a>';
    });
    html += '</div></div>';
  }

  html += '</div>'; // detail-wrap
  return html;
}

function renderFooter() {
  return '<footer class="site-footer"><div class="footer-links">' +
    '<a href="/">Drop Radar</a><a href="/resell">Resell</a><a href="/releases">Releases</a><a href="/auth">Auth Guide</a><a href="/blog">Blog</a>' +
    '</div><div>© 2026 SNEAKYRADAR — Compare. Track. Save.</div></footer>';
}

function render() {
  var root = document.getElementById("root");
  var content = renderNav();
  if (loading) {
    content += renderBreadcrumb(null) + renderLoading();
  } else if (error || !sneaker) {
    content += renderBreadcrumb(null) + renderNotFound();
  } else {
    content += renderBreadcrumb(sneaker) + renderDetail(sneaker);
  }
  content += renderFooter();
  root.innerHTML = content;

  // Attach hamburger
  var hb = document.querySelector('[data-action="hamburger"]');
  if (hb) hb.addEventListener("click", function() { mobileMenuOpen = !mobileMenuOpen; render(); });
}

// Fetch sneaker data
async function loadSneaker() {
  if (!sneakerSlug) { loading = false; error = true; render(); return; }

  var query = slugToQuery(sneakerSlug);
  console.log("[SNEAKER] Loading:", sneakerSlug, "→ query:", query);

  try {
    var res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "search", query: query, limit: 20, page: 1 }),
    });
    var json = await res.json();

    if (json.error || !json.data || json.data.length === 0) {
      loading = false; error = true; render(); return;
    }

    var drops = kicksToDrops(json.data);

    // Find best match by slug similarity
    var targetSlug = sneakerSlug.toLowerCase();
    var bestMatch = null;
    var bestScore = -1;

    drops.forEach(function(d) {
      var dSlug = nameToSlug(d.name);
      // Exact slug match
      if (dSlug === targetSlug) { bestMatch = d; bestScore = 1000; return; }
      // Partial match scoring
      var targetWords = targetSlug.split("-");
      var dWords = dSlug.split("-");
      var matchCount = 0;
      targetWords.forEach(function(w) { if (dWords.indexOf(w) >= 0) matchCount++; });
      var score = matchCount / Math.max(targetWords.length, 1);
      if (score > bestScore) { bestScore = score; bestMatch = d; }
    });

    if (bestMatch && bestScore >= 0.4) {
      sneaker = bestMatch;
      // Related = other results excluding the matched one
      related = drops.filter(function(d) { return d !== bestMatch; }).slice(0, 6);
      updateMeta(sneaker);
    } else {
      error = true;
    }

    loading = false;
    render();
  } catch(err) {
    console.error("[SNEAKER] Load error:", err);
    loading = false; error = true; render();
  }
}

// Init
render();
loadSneaker();
</script>
